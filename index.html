function consensus(userResults){
  var entries=Object.values(userResults||{});
  var active=entries.filter(function(r){return r.status&&r.status!=="Untested";});
  if(active.length===0)return "Untested";
  if(active.every(function(r){return r.status==="Future";}))return "Future";
  if(active.some(function(r){return r.status==="Fail";}))return "Fail";
  if(active.some(function(r){return r.status==="Blocked";}))return "Blocked";
  if(active.every(function(r){return r.status==="Pass";}))return "Pass";
  return "In Progress";
}

function calcStats(arr,res){
  var pass=0,fail=0,blocked=0,inprog=0;
  arr.forEach(function(t){
    var c=consensus(res[t.id]);
    if(c==="Pass")pass++;
    else if(c==="Fail")fail++;
    else if(c==="Blocked")blocked++;
    else if(c==="In Progress")inprog++;
  });
  var tot=arr.length,tested=pass+fail+blocked+inprog;
  return{total:tot,pass:pass,fail:fail,blocked:blocked,inprog:inprog,tested:tested,score:tot?Math.round(pass/tot*100):0,comp:tot?Math.round(tested/tot*100):0};
}

function LeaderboardView(p){
  var userMap={};

      var u=userMap[r.user_name];
      if(r.status==="Untested")return;
      u.total++;
      if(r.status==="Pass")u.pass++;

      else if(r.status==="Blocked")u.blocked++;
      else if(r.status==="Future")u.future++;
